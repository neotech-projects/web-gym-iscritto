<div class="access-container">
    <div class="logo-container">
        <img src="assets/images/logo_investire-removebg-preview.png" alt="Logo Palestra" />
    </div>

    <!-- Verifica in corso (redirect in attesa) -->
    <div id="statusContent" *ngIf="state === 'loading'" class="status-message">
        <span class="status-badge badge-loading">
            <i class="ri-loader-4-line me-2 spin"></i>
            Verifica prenotazione in corso...
        </span>
        <p class="mt-3 text-muted">Attendere il reindirizzamento.</p>
    </div>

    <!-- Esito dalla redirect (ok/ko) oppure no-user / no-uuid -->
    <div id="statusContent" *ngIf="state !== 'loading'">
        <span class="status-badge" [ngClass]="badgeClass">
            <i [class]="'ri-' + (esito === 'ok' ? 'check' : 'close') + '-circle-line me-2'" *ngIf="state === 'result'"></i>
            <i class="ri-time-line me-2" *ngIf="state === 'no-uuid'"></i>
            <i class="ri-lock-line me-2" *ngIf="state === 'no-user'"></i>
            {{ badgeText }}
        </span>
        <div>
            <img [src]="imagePath" [alt]="badgeText" class="door-image" />
        </div>
        <div class="status-message">
            {{ message }}
        </div>
    </div>

    <div class="info-text">
        <i class="ri-qr-code-line me-1"></i>
        Accesso tramite QR Code
    </div>
</div>
